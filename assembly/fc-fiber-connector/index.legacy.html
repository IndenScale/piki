<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC 光纤连接器 — ADL 装配体演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; background: #1a1a2e; }
  #canvas { position: absolute; top: 0; left: 0; width: 75%; height: 100%; }
  #panel {
    position: absolute; top: 0; right: 0; width: 25%; height: 100%;
    background: rgba(22, 22, 44, 0.95); color: #c0c0d0; padding: 20px;
    overflow-y: auto; border-left: 1px solid #333;
  }
  #panel h2 { color: #e0e0e0; margin-bottom: 12px; font-size: 18px; }
  #panel .desc { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
  #panel .desc i { font-style: normal; }
  #panel .group { margin-bottom: 18px; }
  #panel label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
  #panel input[type=range] { width: 100%; accent-color: #6495ED; }
  #panel input[type=range]:disabled { accent-color: #555; opacity: 0.4; }
  #panel .value { font-size: 11px; color: #6495ED; margin-bottom: 10px; }
  #panel .locked { color: #cc4444; font-size: 11px; margin-bottom: 10px; }
  #panel .active { color: #44cc44; font-size: 11px; margin-bottom: 10px; }
  #panel .preset { display: flex; gap: 6px; margin-bottom: 16px; }
  #panel .preset button { flex: 1; padding: 8px 0; border: 1px solid #444; border-radius: 4px; background: #222; color: #ccc; cursor: pointer; font-size: 12px; }
  #panel .preset button:hover { background: #333; }
  #panel .preset button.active { border-color: #3c8; }
  #panel .preset button.inserted { background: #2a6; border-color: #3c8; color: #fff; }
  #panel .preset button.removed { background: #642; border-color: #864; }
  #panel .transform {
    margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 6px;
    font-size: 12px; font-family: monospace;
  }
  #panel .transform span { color: #6495ED; }
  #panel hr { border: none; border-top: 1px solid #333; margin: 16px 0; }
</style>
</head>
<body>
<div id="canvas"></div>
<div id="panel">
  <h2>🔗 FC 光纤连接器</h2>
  <div class="desc">
    从 ODF 适配器相对位姿推导插头全局坐标。<br>
    <i style="color:#4c4">● 绿色</i> = 已解锁 &nbsp;
    <i style="color:#c44">● 红色</i> = 已锁定
  </div>

  <div class="preset">
    <button id="btn-removed" class="removed active">拔出</button>
    <button id="btn-inserted">插入到底</button>
  </div>

  <div class="group">
    <label>插入深度 (mm)</label>
    <input type="range" id="t" min="0" max="15" value="0" step="0.5">
    <div class="value" id="t-val">0.0 mm</div>
  </div>

  <div class="group">
    <label>旋转角度 (°)</label>
    <input type="range" id="theta" min="0" max="30" value="0" step="0.5" disabled>
    <div class="value" id="theta-val">0.0°</div>
    <div class="locked" id="theta-status">● 锁定：请先完全插入</div>
  </div>

  <hr>
  <div class="transform" id="transform-display">
    ODF 适配器 & 插头位姿<br>
    <span id="odf-tf">适配器: tx=0 ty=0 tz=30</span><br>
    <span id="plug-tf">插头: tx=0 ty=0 tz=42</span>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
               "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════
// ADL 求解器 (adl/src/adl/compiler/constraint_solver.py 的 JS 移植)
// ═══════════════════════════════════════════════

function solveSlotMate(parentGlobal, slotOrigin, slotDir, childInterfaceLocal, t, thetaDeg) {
  // parentGlobal: { tx, ty, tz, rx, ry, rz }
  // slotOrigin:   { x, y, z }  — in parent local
  // slotDir:      { x, y, z }  — unit vector
  // childInterfaceLocal: { x, y, z }  — connector tip in child local coords
  // t:            push distance
  // thetaDeg:     rotation about slot axis (degrees)

  // Step 1: parent global
  const tx = parentGlobal.tx + slotOrigin.x + slotDir.x * t;
  const ty = parentGlobal.ty + slotOrigin.y + slotDir.y * t;
  const tz = parentGlobal.tz + slotOrigin.z + slotDir.z * t;

  // Step 2: subtract child interface offset (bring from tip to child origin)
  const cx = tx - childInterfaceLocal.x;
  const cy = ty - childInterfaceLocal.y;
  const cz = tz - childInterfaceLocal.z;

  // Step 3: rotation about slot axis
  const rotZ = -thetaDeg * Math.PI / 180;  // positive = clockwise

  return { tx: cx, ty: cy, tz: cz, rotZ };
}

// ═══════════════════════════════════════════════
// Scene
// ═══════════════════════════════════════════════

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, 0.75, 1, 500);
camera.position.set(80, 40, 100);
camera.lookAt(0, 5, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById('canvas').appendChild(renderer.domElement);

new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0x404060, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(50, 80, 30);
scene.add(sun);

// ── ODF 面板 ──
const odfGeo = new THREE.BoxGeometry(40, 40, 5);
const odfMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.4, metalness: 0.5 });
const odf = new THREE.Mesh(odfGeo, odfMat);
odf.position.set(0, 0, 32.5);  // ODF face at z=30
scene.add(odf);

// ── Adapter flange at ODF face, z=30 ──
const adapterGroup = new THREE.Group();
adapterGroup.position.set(0, 0, 30);
scene.add(adapterGroup);

// Adapter body extends back from flange
const adapterGeo = new THREE.CylinderGeometry(6, 6, 20, 32);
const adapterMat = new THREE.MeshStandardMaterial({ color: 0x667788, roughness: 0.3, metalness: 0.7 });
const adapterBody = new THREE.Mesh(adapterGeo, adapterMat);
adapterBody.rotation.x = Math.PI / 2;
adapterBody.position.z = -10;  // extends from z=30 back to z=10
adapterGroup.add(adapterBody);

// Flange ring
const flangeGeo = new THREE.TorusGeometry(7, 1.5, 16, 32);
const flangeMat2 = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.2, metalness: 0.8 });
const flangeRing = new THREE.Mesh(flangeGeo, flangeMat2);
adapterGroup.add(flangeRing);

// Key slot marker
const keyGeo = new THREE.BoxGeometry(2, 2, 3);
const keyMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
const keyMesh = new THREE.Mesh(keyGeo, keyMat);
keyMesh.position.set(0, 7, 0);
adapterGroup.add(keyMesh);

// ── Plug group ──
const plugGroup = new THREE.Group();
scene.add(plugGroup);

// Plug body
const plugBodyGeo = new THREE.CylinderGeometry(5, 5, 12, 32);
const plugBodyMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.3, metalness: 0.6 });
const plugBodyMesh = new THREE.Mesh(plugBodyGeo, plugBodyMat);
plugBodyMesh.rotation.x = Math.PI / 2;
plugBodyMesh.position.z = 6;  // body center at +6 from plug origin
plugGroup.add(plugBodyMesh);

// Nut (octagonal)
const nutGeo = new THREE.CylinderGeometry(6.5, 6.5, 8, 8);
const nutMat2 = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
const nutMesh = new THREE.Mesh(nutGeo, nutMat2);
nutMesh.rotation.x = Math.PI / 2;
nutMesh.position.z = -2;  // nut from z=-6 to z=+2
plugGroup.add(nutMesh);

// Connector tip (ferrule) — at z=+18 local
const tipGeo = new THREE.CylinderGeometry(2.5, 2.5, 4, 16);
const tipMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.1, emissive: 0x111111 });
const tipMesh = new THREE.Mesh(tipGeo, tipMat);
tipMesh.rotation.x = Math.PI / 2;
tipMesh.position.z = 18;  // tip at far end
plugGroup.add(tipMesh);

// Rotation indicator line
const indGeo = new THREE.BoxGeometry(0, 7, 40);
const indMat = new THREE.MeshBasicMaterial({ color: 0x4499cc, transparent: true, opacity: 0.5 });
const indicator = new THREE.Mesh(indGeo, indMat);
plugGroup.add(indicator);
indicator.position.set(0, 3.5, 0);

// ── Solver ──
// ODF 适配器在 world (0, 0, 30)，槽口朝外 +z（插件从 +z 方向插入）
// 但实际光纤是从外部插入 ODF，即从 z>30 方向插入
// slot_origin = (0, 0, 30), slot_dir = (0, 0, -1)  → 向 ODF 内部插入
// child_interface = connector tip at (0, 0, 18) in plug local coords

// Adapter opening at world (0,0,30). Plug inserts from +z side (outside ODF).
// Slot direction = -z (into ODF). Plug tip (ferrule) at z=+18 in plug local coords.
// t=0 → tip at z=30 → plug center at z=30-18=12  (plug touching adapter)
// t=15 → tip at z=30-15=15 → plug center at z=15-18=-3 (fully inserted)
const PARENT_GLOBAL = { tx: 0, ty: 0, tz: 0, rx: 0, ry: 0, rz: 0 };
const SLOT_ORIGIN = { x: 0, y: 0, z: 30 };  // adapter opening in world coords
const SLOT_DIR = { x: 0, y: 0, z: -1 };        // insertion INTO the ODF (toward +z)
const CHILD_INTERFACE = { x: 0, y: 0, z: -18 }; // tip in plug local coords

let inserted = false;

function updateTransform() {
  const t = parseFloat(document.getElementById('t').value);
  const theta = parseFloat(document.getElementById('theta').value);

  const result = solveSlotMate(PARENT_GLOBAL, SLOT_ORIGIN, SLOT_DIR, CHILD_INTERFACE, t, theta);

  plugGroup.position.set(result.tx, result.ty, result.tz);
  plugGroup.rotation.set(0, 0, result.rotZ);  // rotation about Z (insertion axis)

  document.getElementById('t-val').textContent = t.toFixed(1) + ' mm';
  document.getElementById('theta-val').textContent = theta.toFixed(1) + '°';

  const rotateLocked = !inserted;
  document.getElementById('theta').disabled = rotateLocked;
  if (rotateLocked) {
    document.getElementById('theta-status').textContent = '● 锁定：请先完全插入';
    document.getElementById('theta-status').className = 'locked';
  } else {
    document.getElementById('theta-status').textContent = '● 已解锁 (' + theta.toFixed(1) + '°)';
    document.getElementById('theta-status').className = 'active';
  }

  document.getElementById('odf-tf').textContent =
    '适配器: tx=0 ty=0 tz=30 (ODF 面板)';
  document.getElementById('plug-tf').textContent =
    '插头: tx=' + result.tx.toFixed(1) +
    ' ty=' + result.ty.toFixed(1) +
    ' tz=' + result.tz.toFixed(1) +
    ' rot_z=' + theta.toFixed(1) + '°';
}

function setInserted(val) {
  inserted = val;
  document.getElementById('t').value = val ? 15 : 0;
  if (!val) document.getElementById('theta').value = 0;
  updateTransform();
  document.querySelectorAll('.preset button').forEach(b => b.classList.remove('active'));
  (val ? document.getElementById('btn-inserted') : document.getElementById('btn-removed')).classList.add('active');
}

document.getElementById('t').addEventListener('input', () => {
  const t = parseFloat(document.getElementById('t').value);
  if (t >= 15 !== inserted) setInserted(t >= 15);
  else updateTransform();
});
document.getElementById('theta').addEventListener('input', updateTransform);
document.getElementById('btn-inserted').addEventListener('click', () => setInserted(true));
document.getElementById('btn-removed').addEventListener('click', () => setInserted(false));

updateTransform();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth * 0.75, window.innerHeight);
  camera.aspect = 0.75;
  camera.updateProjectionMatrix();
});
window.dispatchEvent(new Event('resize'));

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
