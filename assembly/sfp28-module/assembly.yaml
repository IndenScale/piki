# 光模块插入交换机 —— 槽配合典型示例
#
# 几何关系：
#   - 交换机 SFP28 笼子：沿 -Z 方向推入，原点在交换机前面板 z=200
#   - 光模块：长 70mm，接口在模块尾部 z=50
#   - 配合参数：(t) = 推入距离
#
# 自由度数：1（沿槽方向推入）

name: 光模块插入交换机
description: |
  SFP28 光模块沿笼子推入交换机。
  槽配合求解器：一个推入距离参数控制模块位置。

entities:
  - id: switch
    label: 交换机
    bbox: { hw: 220, hh: 22, hd: 250 }
    color: "#334455"

  - id: module
    label: 光模块
    bbox: { hw: 14, hh: 9, hd: 35 }
    color: "#888888"

mate:
  type: slot
  parent_slot_origin: [0, 0, 200]
  parent_slot_dir: [0, 0, -1]
  child_interface_offset: [0, 0, 50]
  params:
    t: { label: "推入距离 (mm)", min: 0, max: 60, default: 30 }
