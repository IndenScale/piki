<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灭火器地面放置 — ADL 装配体演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; background: #1a1a2e; }
  #canvas { position: absolute; top: 0; left: 0; width: 75%; height: 100%; }
  #panel {
    position: absolute; top: 0; right: 0; width: 25%; height: 100%;
    background: rgba(22, 22, 44, 0.95); color: #c0c0d0; padding: 20px;
    overflow-y: auto; border-left: 1px solid #333;
  }
  #panel h2 { color: #e0e0e0; margin-bottom: 12px; font-size: 18px; }
  #panel .desc { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
  #panel .group { margin-bottom: 18px; }
  #panel label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
  #panel input[type=range] { width: 100%; margin-bottom: 4px; accent-color: #6495ED; }
  #panel .value { font-size: 11px; color: #6495ED; margin-bottom: 10px; }
  #panel .transform { margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 6px; font-size: 12px; font-family: monospace; }
  #panel .transform span { color: #6495ED; }
  #panel hr { border: none; border-top: 1px solid #333; margin: 16px 0; }
</style>
</head>
<body>
<div id="canvas"></div>
<div id="panel">
  <h2>🧯 灭火器地面放置</h2>
  <div class="desc">
    10m × 10m 地面，灭火器 Ø100mm × 500mm。<br>
    面面配合：基准面（地面顶面）+ 配合面（灭火器底面）。
  </div>

  <div class="group">
    <label>X 位置 (mm)</label>
    <input type="range" id="u" min="-5000" max="5000" value="2000" step="10">
    <div class="value" id="u-val">2000 mm</div>
  </div>

  <div class="group">
    <label>Z 位置 (mm)</label>
    <input type="range" id="v" min="-5000" max="5000" value="1500" step="10">
    <div class="value" id="v-val">1500 mm</div>
  </div>

  <div class="group">
    <label>旋转 (°)</label>
    <input type="range" id="theta" min="0" max="360" value="45" step="1">
    <div class="value" id="theta-val">45°</div>
  </div>

  <div class="group">
    <label>离地高度 (mm)</label>
    <input type="range" id="distance" min="0" max="500" value="0" step="1">
    <div class="value" id="dist-val">0 mm</div>
  </div>

  <hr>

  <div class="transform" id="transform-display">
    灭火器全局位姿<br>
    <span>tx=2000.0, ty=350.0, tz=1500.0</span><br>
    <span>rot_y=45.0°</span>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
               "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 5000, 20000);

const camera = new THREE.PerspectiveCamera(50, 0.75, 100, 30000);
camera.position.set(8000, 5000, 8000);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.getElementById('canvas').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(2000, 350, 1500);
controls.update();

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x404060, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 2.5);
sun.position.set(10000, 15000, 5000);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 100;
sun.shadow.camera.far = 50000;
sun.shadow.camera.left = -15000;
sun.shadow.camera.right = 15000;
sun.shadow.camera.top = 15000;
sun.shadow.camera.bottom = -15000;
scene.add(sun);

// Grid
const grid = new THREE.GridHelper(20000, 40, 0x335566, 0x223344);
grid.position.y = -0.1;
scene.add(grid);

// ── Geometry ──
// Ground: 10m × 10m × 200mm
const groundGeo = new THREE.BoxGeometry(10000, 200, 10000);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, transparent: true, opacity: 0.5, wireframe: true });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.set(0, 100, 0);
ground.castShadow = true;
ground.receiveShadow = true;
scene.add(ground);

// Ground top indicator (transparent plane)
const topPlaneGeo = new THREE.PlaneGeometry(10000, 10000);
const topPlaneMat = new THREE.MeshBasicMaterial({ color: 0x4488aa, side: THREE.DoubleSide, transparent: true, opacity: 0.08 });
const topPlane = new THREE.Mesh(topPlaneGeo, topPlaneMat);
topPlane.rotation.x = -Math.PI / 2;
topPlane.position.y = 200;
scene.add(topPlane);

// Extinguisher: cylinder Ø100mm × 500mm
const extGeo = new THREE.CylinderGeometry(50, 50, 500, 32);
const extMat = new THREE.MeshStandardMaterial({ color: 0xCC0000, roughness: 0.4, metalness: 0.2 });
const extinguisher = new THREE.Mesh(extGeo, extMat);
extinguisher.castShadow = true;
extinguisher.receiveShadow = true;
scene.add(extinguisher);

// Extinguisher bottom indicator (small disc)
const discGeo = new THREE.CylinderGeometry(52, 52, 2, 32);
const discMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
const disc = new THREE.Mesh(discGeo, discMat);
extinguisher.add(disc);
disc.position.y = -250;

// ── Solver (mirrors adl/src/adl/compiler/constraint_solver.py) ──
function solveFaceMate(u, v, thetaDeg, distance) {
  // Ground BBox: hw=5000, hh=100, hd=5000, top at y=100
  const groundCenterY = 100;
  // Extinguisher BBox: hw=50, hh=250, hd=50, bottom at y=-250
  const extBottomY = -250; // local Y of bottom face center
  const extHalfH = 250;

  const thetaRad = THREE.MathUtils.degToRad(thetaDeg);

  // Position:
  // x = u  (ground top center at (u, 100, v) → then + normal*distance)
  // y = groundCenterY + distance + extHalfH
  // z = v
  const tx = u;
  const ty = groundCenterY + distance + extHalfH;
  const tz = v;

  return { tx, ty, tz, ry: thetaDeg };
}

function updateTransform() {
  const u = parseFloat(document.getElementById('u').value);
  const v = parseFloat(document.getElementById('v').value);
  const theta = parseFloat(document.getElementById('theta').value);
  const dist = parseFloat(document.getElementById('distance').value);

  document.getElementById('u-val').textContent = `${u} mm`;
  document.getElementById('v-val').textContent = `${v} mm`;
  document.getElementById('theta-val').textContent = `${theta}°`;
  document.getElementById('dist-val').textContent = `${dist} mm`;

  const { tx, ty, tz, ry } = solveFaceMate(u, v, theta, dist);
  extinguisher.position.set(tx, ty, tz);
  extinguisher.rotation.set(0, THREE.MathUtils.degToRad(ry), 0);

  document.getElementById('transform-display').innerHTML = `
    灭火器全局位姿<br>
    <span>tx=${tx.toFixed(1)} ty=${ty.toFixed(1)} tz=${tz.toFixed(1)}</span><br>
    <span>rot_y=${ry.toFixed(1)}°</span>
  `;
}

document.getElementById('u').addEventListener('input', updateTransform);
document.getElementById('v').addEventListener('input', updateTransform);
document.getElementById('theta').addEventListener('input', updateTransform);
document.getElementById('distance').addEventListener('input', updateTransform);

// Initial
updateTransform();

// ── Resize ──
window.addEventListener('resize', () => {
  const w = window.innerWidth * 0.75;
  const h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});
// Trigger initial resize
window.dispatchEvent(new Event('resize'));

// ── Render loop ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
