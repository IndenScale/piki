name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=piki --cov-report=xml

      - name: Run samples check
        run: |
          # 01-telecom-expansion: 电信设备扩容示例，应全部通过
          cd samples/01-telecom-expansion
          piki check
          cd ../..

          # 02-modular-datacenter: 模块化数据中心示例，应全部通过
          cd samples/02-modular-datacenter
          piki check
          cd ../..

          # 03-mechanical-keyboard: 机械键盘设计示例，应全部通过
          cd samples/03-mechanical-keyboard
          piki check
          cd ../..

      - name: Lint with ruff
        run: ruff check src tests samples

      - name: Type check with mypy
        run: mypy src
