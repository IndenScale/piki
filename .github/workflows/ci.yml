name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=piki --cov-report=xml

      - name: Run samples check
        run: |
          # 01-hello-piki: 最小示例，应全部通过
          cd samples/01-hello-piki
          piki check
          cd ../..

          # 02-telecom-rack: 基础示例，应全部通过
          cd samples/02-telecom-rack
          piki check
          cd ../..

          # 03-data-center: 进阶示例，有 1 个警告（负载不均衡），应返回 0
          cd samples/03-data-center
          piki check
          cd ../..

          # 04-modular-dc: 高级示例，datacenter 插件，应全部通过
          cd samples/04-modular-dc
          piki check
          cd ../..

      - name: Lint with ruff
        run: ruff check src tests samples

      - name: Type check with mypy
        run: mypy src
